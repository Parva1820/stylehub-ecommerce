<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleHub | Online Clothing Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">StyleHub</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#" class="cart-link">🛒 Cart <span id="cart-count">0</span></a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Summer Collection 2026</h1>
            <p>Discover the latest trends in fashion</p>
            <button class="btn btn-primary" onclick="scrollToShop()">Shop Now</button>
        </div>
    </section>

    <!-- Products Section -->
    <section id="shop" class="shop">
        <div class="container">
            <h2>Our Products</h2>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
                <select id="categoryFilter" onchange="filterProducts()">
                    <option value="all">All Categories</option>
                    <option value="men">Men</option>
                    <option value="women">Women</option>
                    <option value="kids">Kids</option>
                </select>
            </div>
            <div class="product-grid" id="productGrid">
                <!-- Products loaded via JavaScript -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCart()">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">Total: $<span id="totalPrice">0.00</span></div>
            <button class="btn btn-primary" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <!-- Checkout Form -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCheckout()">&times;</span>
            <h2>Checkout</h2>
            <form id="checkoutForm" onsubmit="processOrder(event)">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Address" required>
                <input type="text" placeholder="Card Number (XXXX-XXXX-XXXX-XXXX)" required>
                <button type="submit" class="btn btn-primary">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 StyleHub. All rights reserved.</p>
            <p>📞 Contact: 9313377514 | Email: support@stylehub.com</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
